<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Interactive Demo - Task Manager</title>
    <link rel="stylesheet" href="js_experiment.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Daily Focus</h1>
            <p>Manage your tasks dynamically using JavaScript</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" />
            <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="stats-section">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be injected here by JavaScript -->
        </ul>
        
        <button id="clearCompletedBtn" class="clear-btn" style="display: none;">Clear Completed Tasks</button>
    </div>

    <script src="js_experiment.js"></script>
</body>
</html>
